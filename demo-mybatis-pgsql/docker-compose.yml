# 로컬 개발용 PostgreSQL 단일 컨테이너 구성.
# 이 파일의 POSTGRES_DB/POSTGRES_USER/POSTGRES_PASSWORD는
# src/main/resources/application.yml의 spring.datasource 값과 반드시 일치해야 애플리케이션이 접속할 수 있다.
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine       # 공식 PostgreSQL 16 경량(alpine) 이미지
    container_name: demo-pgsql      # `docker exec -i demo-pgsql psql ...` 등에서 참조하는 컨테이너 이름
    restart: unless-stopped         # 도커 데몬 재시작 시 자동으로 다시 기동 (명시적으로 stop한 경우는 제외)
    environment:
      # 공식 postgres 이미지는 컨테이너 최초 기동(데이터 볼륨이 비어있을 때) 시에만
      # 아래 값으로 DB/계정을 자동 생성한다. 볼륨이 이미 있으면(재기동) 이 값들은 무시되므로,
      # 계정/비밀번호를 바꾸고 싶다면 `docker compose down -v`로 볼륨을 지우고 다시 올려야 한다.
      POSTGRES_DB: ujudb
      POSTGRES_USER: ujutech
      POSTGRES_PASSWORD: ujupwd
    ports:
      - "5432:5432"                # 호스트:컨테이너, localhost:5432로 접속 가능하게 매핑
    volumes:
      - demo_pgdata:/var/lib/postgresql/data   # 컨테이너를 지워도 데이터가 남도록 named volume에 영속화

volumes:
  demo_pgdata:   # 위에서 참조하는 named volume 선언 (docker volume ls로 확인 가능)
